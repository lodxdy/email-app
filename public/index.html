<!DOCTYPE html>
<html>

<head>

<title>
Visa Email Automation
</title>


<style>


*{
box-sizing:border-box;
font-family:
Arial, sans-serif;
}


body{

height:100vh;

margin:0;

display:flex;

justify-content:center;

align-items:center;

background:#0f172a;

color:white;

}



.card{

width:430px;

background:#111827;

padding:30px;

border-radius:18px;

box-shadow:
0 20px 50px rgba(0,0,0,.4);

}



h2{

margin:0;

}


.subtitle{

color:#94a3b8;

font-size:14px;

margin:8px 0 25px;

}



input{

width:100%;

padding:12px;

margin-bottom:12px;

border-radius:10px;

border:1px solid #334155;

background:#020617;

color:white;

}



input::placeholder{

color:#64748b;

}



.file{

border:1px dashed #334155;

padding:10px;

border-radius:10px;

margin-bottom:12px;

}



button{

width:100%;

padding:13px;

border:0;

border-radius:10px;

background:
linear-gradient(
135deg,
#2563eb,
#06b6d4
);

color:white;

font-weight:bold;

cursor:pointer;

margin-top:10px;

}



.secondary{

background:#334155;

}



#status{

text-align:center;

margin-top:15px;

font-size:14px;

color:#94a3b8;

}



.remember{

font-size:13px;

color:#94a3b8;

display:flex;

align-items:center;

gap:8px;

margin-bottom:10px;

}


.remember input{

width:auto;

margin:0;

}


</style>


</head>


<body>


<div class="card">


<h2>
Visa Review System
</h2>


<div class="subtitle">
Email automation tool
</div>



<form id="form">


<input
name="senderName"
placeholder="Your Name"
required
>


<input
type="email"
name="senderEmail"
placeholder="Your Gmail"
required
>


<input
type="password"
name="appPassword"
placeholder="Gmail App Password"
required
>



<input
name="applicantName"
placeholder="Applicant Name"
required
>


<input
name="trn"
placeholder="TRN Number"
required
>


<input
type="email"
name="toEmail"
placeholder="Recipient Email"
required
>


<div class="file">

<input
type="file"
name="pdf"
accept="application/pdf"
>

</div>



<div class="remember">

<input
type="checkbox"
id="remember"
>

Remember my details

</div>



<button>
Send Email
</button>



<button
type="button"
class="secondary"
id="clear"
>
Clear Saved Details
</button>


</form>



<div id="status"></div>



</div>



<script>


const form =
document.getElementById("form");


const status =
document.getElementById("status");


const remember =
document.getElementById("remember");


const clear =
document.getElementById("clear");




// Load saved data

window.onload=()=>{


const saved =
localStorage.getItem(
"visaUser"
);


if(saved){


const data =
JSON.parse(saved);



for(let key in data){

const field =
document.querySelector(
`[name="${key}"]`
);


if(field){

field.value=data[key];

}

}


remember.checked=true;


}



};





form.addEventListener(
"submit",

async(e)=>{


e.preventDefault();


status.innerText=
"Sending...";



const formData =
new FormData(form);



// Save details

if(remember.checked){


const saveData={

senderName:
formData.get("senderName"),

senderEmail:
formData.get("senderEmail"),

appPassword:
formData.get("appPassword"),

toEmail:
formData.get("toEmail")

};



localStorage.setItem(
"visaUser",
JSON.stringify(saveData)
);


}

else{


localStorage.removeItem(
"visaUser"
);


}




try{


const response =
await fetch(
"/submit",
{

method:"POST",

body:formData

}
);



const result =
await response.json();



if(result.success){


status.innerText=
"Email sent successfully ✅";



// Clear only applicant details

document.querySelector(
'[name="applicantName"]'
).value="";


document.querySelector(
'[name="trn"]'
).value="";


document.querySelector(
'[name="pdf"]'
).value="";


}

else{


status.innerText=
"Failed ❌";


}



}

catch(err){

status.innerText=
"Server error ❌";

}


});





clear.onclick=()=>{


localStorage.removeItem(
"visaUser"
);


location.reload();


};


</script>


</body>

</html>
